<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-indigo-700 text-white p-6 rounded-b-[2rem] shadow-lg mb-4">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <span class="text-xs opacity-70 uppercase font-bold tracking-wider">Mês de Referência</span>
                <input type="month" id="monthPicker" onchange="render()" class="bg-transparent text-xl font-bold focus:outline-none border-none">
            </div>
            <div class="bg-indigo-600 p-2 rounded-full"><i data-lucide="calendar"></i></div>
        </div>
        <div class="mt-4">
            <p class="opacity-80 text-sm">Sobra Total Estimada</p>
            <h2 id="total-geral" class="text-3xl font-bold mt-1 text-white">R$ 0,00</h2>
        </div>
    </header>

    <main class="px-4 space-y-4">
        
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="text-[10px] text-slate-500 uppercase font-black">Salário Dia 05</label>
                    <input type="number" id="salary5" oninput="saveData()" class="w-full bg-transparent font-bold text-indigo-700 focus:outline-none" placeholder="0.00">
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="text-[10px] text-slate-500 uppercase font-black">Salário Dia 20</label>
                    <input type="number" id="salary20" oninput="saveData()" class="w-full bg-transparent font-bold text-indigo-700 focus:outline-none" placeholder="0.00">
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-emerald-500 p-4 rounded-2xl shadow-sm text-white">
                <span class="text-[10px] uppercase font-bold opacity-80">Sobra Dia 05</span>
                <p id="balance5" class="text-lg font-bold">R$ 0,00</p>
            </div>
            <div class="bg-purple-600 p-4 rounded-2xl shadow-sm text-white">
                <span class="text-[10px] uppercase font-bold opacity-80">Sobra Dia 20</span>
                <p id="balance20" class="text-lg font-bold">R$ 0,00</p>
            </div>
        </div>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-600"></i> Novo Lançamento
            </h3>
            <div class="space-y-3">
                <input type="text" id="cardName" placeholder="O que comprou?" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                
                <div class="flex gap-2">
                    <input type="number" id="cardValue" placeholder="Valor total" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                    <select id="installments" class="w-24 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                        <option value="1">1x</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="6">6x</option>
                        <option value="10">10x</option>
                        <option value="12">12x</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <select id="cardDay" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                        <option value="5">Pagamento Dia 05</option>
                        <option value="20">Pagamento Dia 20</option>
                    </select>
                    <button onclick="addExpense()" class="bg-indigo-600 text-white px-6 font-bold rounded-xl active:scale-95 transition-all">
                        Salvar
                    </button>
                </div>
            </div>
        </section>

        <div id="expensesList" class="space-y-3">
            </div>

    </main>

    <script>
        // Configuração inicial do mês atual
        const now = new Date();
        document.getElementById('monthPicker').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        let expenses = JSON.parse(localStorage.getItem('fin_expenses')) || [];
        
        // Carregar salários
        document.getElementById('salary5').value = localStorage.getItem('fin_s5') || '';
        document.getElementById('salary20').value = localStorage.getItem('fin_s20') || '';

        function addExpense() {
            const name = document.getElementById('cardName').value;
            const totalValue = parseFloat(document.getElementById('cardValue').value);
            const inst = parseInt(document.getElementById('installments').value);
            const day = document.getElementById('cardDay').value;
            const startDate = document.getElementById('monthPicker').value; // Começa no mês selecionado

            if (name && totalValue) {
                expenses.push({
                    id: Date.now(),
                    name,
                    totalValue,
                    installments: inst,
                    day,
                    startDate // 'YYYY-MM'
                });
                
                document.getElementById('cardName').value = '';
                document.getElementById('cardValue').value = '';
                saveData();
            }
        }

        function removeExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            saveData();
        }

        function saveData() {
            localStorage.setItem('fin_expenses', JSON.stringify(expenses));
            localStorage.setItem('fin_s5', document.getElementById('salary5').value);
            localStorage.setItem('fin_s20', document.getElementById('salary20').value);
            render();
        }

        function getMonthDiff(d1, d2) {
            let months;
            months = (d2.getFullYear() - d1.getFullYear()) * 12;
            months -= d1.getMonth();
            months += d2.getMonth();
            return months <= 0 ? 0 : months;
        }

        function render() {
            const list = document.getElementById('expensesList');
            const selectedMonthStr = document.getElementById('monthPicker').value;
            const selectedDate = new Date(selectedMonthStr + '-01T00:00:00');

            const s5 = parseFloat(document.getElementById('salary5').value) || 0;
            const s20 = parseFloat(document.getElementById('salary20').value) || 0;
            
            list.innerHTML = '';
            let totalD5 = 0;
            let totalD20 = 0;

            expenses.forEach(exp => {
                const start = new Date(exp.startDate + '-01T00:00:00');
                const diff = getMonthDiff(start, selectedDate);
                
                // Verifica se a parcela ainda existe neste mês
                if (diff >= 0 && diff < exp.installments) {
                    const valueInstallment = exp.totalValue / exp.installments;
                    const currentParcel = diff + 1;

                    if (exp.day == "5") totalD5 += valueInstallment;
                    else totalD20 += valueInstallment;

                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border-r-4 ${exp.day == '5' ? 'border-emerald-500' : 'border-purple-500'}">
                            <div class="flex-1">
                                <p class="font-bold text-slate-800 text-sm uppercase">${exp.name}</p>
                                <div class="flex gap-2 items-center text-[10px] font-bold text-slate-400">
                                    <span class="bg-slate-100 px-2 py-0.5 rounded">${currentParcel}/${exp.installments} PARCELA</span>
                                    <span>PAGAMENTO DIA ${exp.day}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-slate-700 leading-none">R$ ${valueInstallment.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                <button onclick="removeExpense(${exp.id})" class="text-rose-400 mt-2 hover:text-rose-600 transition-colors">
                                    <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            const bal5 = s5 - totalD5;
            const bal20 = s20 - totalD20;

            document.getElementById('balance5').innerText = `R$ ${bal5.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('balance20').innerText = `R$ ${bal20.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-geral').innerText = `R$ ${(bal5 + bal20).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
